server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: campus-forum
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/campus_forum
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  access-token-secret: campus-forum-access-secret-key-2024
  refresh-token-secret: campus-forum-refresh-secret-key-2024
  access-token-expire: 7200000
  refresh-token-expire: 604800000

forum:
  name: Campus Forum
  description: 校园技术交流论坛

oauth:
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:3000/oauth/callback}

ai:
  openai:
    api-key: sk-488bb53d68034988aae9e4226aef8a6a
    base-url: https://api.deepseek.com
    model-name: deepseek-chat
    image-model-name: dall-e-2
    image-size: 256x256
    enabled: true
