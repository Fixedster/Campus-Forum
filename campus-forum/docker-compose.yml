services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus-forum-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/campus_forum?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root123456
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - mysql
      - redis
    networks:
      - forum-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campus-forum-web
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - app
    networks:
      - forum-network

  mysql:
    image: mysql:8.0
    container_name: campus-forum-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root123456
      - MYSQL_DATABASE=campus_forum
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - forum-network

  redis:
    image: redis:7-alpine
    container_name: campus-forum-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - forum-network

volumes:
  mysql-data:
  redis-data:

networks:
  forum-network:
    driver: bridge
